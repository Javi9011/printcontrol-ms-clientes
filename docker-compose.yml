version: '3.9'

services:

  db-clientes:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ms_clientes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_clientes:/var/lib/postgresql/data
    ports:
      - "5434:5432"   # 5434 para no colisionar con ms-equipos (5433)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-clientes:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      DB_HOST: db-clientes
      DB_PORT: 5432
    depends_on:
      db-clientes:
        condition: service_healthy

volumes:
  pgdata_clientes:
